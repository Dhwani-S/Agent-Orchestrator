<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent6 — 4-Role Cognitive Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0d1117; color: #e6edf3;
    height: 100vh; display: flex; flex-direction: column;
  }

  .header {
    padding: 10px 20px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 10px;
    background: #161b22; flex-shrink: 0;
  }
  .logo {
    width: 30px; height: 30px; background: #6366f1; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff;
  }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header .badge {
    font-size: 10px; padding: 2px 7px; background: #21262d;
    border: 1px solid #30363d; border-radius: 10px; color: #8b949e;
  }

  .chat {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }

  #log {
    max-width: 820px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 6px;
  }

  /* User query */
  .q-line {
    background: #6366f1; color: #fff; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; line-height: 1.5;
    margin-bottom: 8px; align-self: flex-end;
    max-width: 75%;
  }

  /* Iteration header */
  .iter-hdr {
    margin-top: 10px; padding: 6px 10px;
    background: #21262d; border-radius: 6px;
    font-size: 12px; font-weight: 700; color: #8b949e;
    display: flex; align-items: center; gap: 8px;
  }
  .iter-hdr .num {
    background: #6366f1; color: #fff; font-size: 10px;
    padding: 1px 7px; border-radius: 4px;
  }
  .iter-hdr .st { margin-left: auto; font-weight: 600; }
  .iter-hdr .st.ok  { color: #3fb950; }
  .iter-hdr .st.err { color: #f85149; }
  .iter-hdr .st.run { color: #d29922; }

  /* Generic step line */
  .step {
    display: flex; gap: 8px; padding: 4px 0 4px 12px;
    font-size: 12px; line-height: 1.6; align-items: baseline;
    border-left: 2px solid #30363d;
    margin-left: 8px;
  }
  .step:last-child { border-left-color: transparent; }

  .tag {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
    letter-spacing: .4px; white-space: nowrap;
  }
  .tag-mem  { background: #1c2333; color: #58a6ff; }
  .tag-perc { background: #162320; color: #3fb950; }
  .tag-tool { background: #1e3048; color: #79c0ff; }
  .tag-res  { background: #2a2215; color: #d29922; }
  .tag-ans  { background: #1a2e1a; color: #56d364; }
  .tag-art  { background: #261a33; color: #bc8cff; }
  .tag-log  { background: #21262d; color: #8b949e; }

  .val { word-break: break-word; color: #c9d1d9; }
  .val .dim { color: #8b949e; }
  .val .hi  { color: #e6edf3; font-weight: 600; }
  .mono {
    font-family: Consolas, 'Cascadia Code', monospace;
    font-size: 11px; background: #21262d;
    padding: 1px 4px; border-radius: 3px;
  }

  /* Goal checklist */
  .goal-list {
    display: flex; flex-direction: column; gap: 5px;
    margin: 2px 0;
  }
  .goal-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; line-height: 1.5;
    padding: 4px 8px; border-radius: 6px;
    transition: all .3s ease;
  }
  .goal-item:hover { background: #161b22; }
  .goal-check {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #484f58; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .4s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .goal-check::after {
    content: ''; display: block;
    width: 0; height: 0;
    border-bottom: 2px solid #fff; border-right: 2px solid #fff;
    transform: rotate(45deg) scale(0);
    transition: transform .3s cubic-bezier(.4,0,.2,1) .1s;
    margin-top: -1px;
  }
  .goal-item.done .goal-check {
    background: #3fb950; border-color: #3fb950;
    box-shadow: 0 0 8px rgba(63,185,80,.4);
  }
  .goal-item.done .goal-check::after {
    width: 4px; height: 7px;
    transform: rotate(45deg) scale(1);
  }
  .goal-item.open .goal-check {
    border-color: #d29922;
    animation: goalPulse 2s ease infinite;
  }
  @keyframes goalPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(210,153,34,0); }
    50% { box-shadow: 0 0 0 4px rgba(210,153,34,.2); }
  }
  .goal-text { color: #c9d1d9; }
  .goal-item.done .goal-text { color: #3fb950; }
  .goal-item.open .goal-text { color: #d29922; }
  .goal-item.waiting .goal-check {
    border-color: #30363d;
    opacity: .4;
  }
  .goal-item.waiting .goal-text { color: #484f58; }
  .goal-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 3px; text-transform: uppercase;
    letter-spacing: .3px;
  }
  .goal-badge.art { background: #261a33; color: #bc8cff; }

  /* Final answer */
  .final-box {
    margin-top: 12px; padding: 14px 16px;
    background: #161b22; border: 1px solid #3fb950;
    border-left: 4px solid #3fb950; border-radius: 6px;
  }
  .final-box h3 {
    color: #3fb950; font-size: 11px; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .final-box .body {
    font-size: 13px; line-height: 1.7; white-space: pre-wrap; color: #e6edf3;
  }

  /* Error */
  .err-box {
    margin-top: 8px; padding: 10px 14px;
    background: #1f1315; border: 1px solid #f85149;
    border-radius: 6px; color: #f85149; font-size: 12px;
  }

  /* Status */
  .sts {
    padding: 6px 0; font-size: 12px; color: #8b949e;
    display: flex; align-items: center; gap: 6px;
  }
  .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6366f1; animation: p 1s ease infinite;
  }
  @keyframes p { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* Progress loader bar */
  .loader-bar {
    width: 100%; max-width: 820px; margin: 8px auto 4px;
    height: 3px; border-radius: 2px;
    background: #21262d; overflow: hidden;
    position: relative;
  }
  .loader-bar .fill {
    position: absolute; top: 0; left: -40%;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, #6366f1, #818cf8, #6366f1, transparent);
    border-radius: 2px;
    animation: slide 1.5s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { left: -40%; }
    100% { left: 100%; }
  }
  .loader-bar.done .fill {
    animation: none;
    left: 0; width: 100%;
    background: #3fb950;
    transition: all .4s ease;
  }

  /* Thinking dots */
  .thinking {
    display: flex; align-items: center; gap: 4px;
    padding: 8px 12px; margin-left: 8px;
  }
  .thinking .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6366f1;
    animation: bounce .6s ease infinite alternate;
  }
  .thinking .dot:nth-child(2) { animation-delay: .2s; }
  .thinking .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%   { opacity: .3; transform: translateY(0); }
    100% { opacity: 1;  transform: translateY(-4px); }
  }
  .thinking-label {
    font-size: 11px; color: #8b949e; margin-left: 6px;
    font-style: italic;
  }

  /* Input */
  .input-bar {
    border-top: 1px solid #30363d; padding: 10px 20px;
    display: flex; gap: 8px; max-width: 860px; width: 100%;
    margin: 0 auto; flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; padding: 10px 12px; color: #e6edf3;
    font-size: 13px; outline: none;
  }
  .input-bar input:focus { border-color: #6366f1; }
  .input-bar input::placeholder { color: #484f58; }
  .input-bar button {
    background: #6366f1; color: #fff; border: none;
    border-radius: 8px; padding: 10px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .input-bar button:hover { background: #818cf8; }
  .input-bar button:disabled { opacity: .4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">A6</div>
  <h1>Agent6</h1>
  <span class="badge">4-Role Cognitive Agent</span>
</div>

<div class="chat" id="chat">
  <div id="log"></div>
</div>

<div class="input-bar">
  <input id="inp" type="text" placeholder="Ask anything..." autofocus />
  <button id="btn" onclick="send()">Send</button>
</div>

<script>
const log = document.getElementById('log');
const chatEl = document.getElementById('chat');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
let curIterHdr = null;

inp.addEventListener('keydown', e => { if (e.key==='Enter' && !btn.disabled) send(); });

function scroll() {
  requestAnimationFrame(() => chatEl.scrollTop = chatEl.scrollHeight);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addEl(cls, html) {
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = html;
  log.appendChild(d);
  scroll();
  return d;
}

function setStatus(msg) {
  let el = document.getElementById('sts');
  if (!el) {
    el = document.createElement('div');
    el.className = 'sts'; el.id = 'sts';
    log.appendChild(el);
  }
  el.innerHTML = '<span class="pulse"></span> ' + esc(msg);
  scroll();
}

function rmStatus() {
  const el = document.getElementById('sts');
  if (el) el.remove();
}

function markIter(text, cls) {
  if (!curIterHdr) return;
  const st = curIterHdr.querySelector('.st');
  if (st) { st.className = 'st ' + cls; st.textContent = text; }
}

function send() {
  const q = inp.value.trim();
  if (!q) return;
  inp.value = ''; btn.disabled = true;
  curIterHdr = null;

  // separator if not first query
  if (log.children.length > 0) {
    addEl('', '').style.cssText = 'border-top:1px solid #30363d; margin:14px 0;';
  }

  addEl('q-line', esc(q));

  const es = new EventSource('/api/chat?q=' + encodeURIComponent(q));

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);

    switch (d.type) {
      case 'start':
        setStatus('Connecting to agent...');
        break;

      case 'log':
        setStatus(d.message);
        break;

      case 'iter_start': {
        rmStatus();
        rmThinking();
        if (curIterHdr) markIter('done', 'ok');
        const hdr = addEl('iter-hdr',
          '<span class="num">ITER ' + d.iter + '</span>' +
          '<span class="st run">running...</span>');
        curIterHdr = hdr;
        showLoader();
        addEl('step',
          '<span class="tag tag-mem">MEMORY</span>' +
          '<span class="val">' + d.hits + ' relevant hit' + (d.hits!==1?'s':'') + '</span>');
        showThinking('Reasoning...');
        break;
      }

      case 'perception': {
        rmThinking();
        let items = '<div class="goal-list">';
        let hitOpen = false;
        d.goals.forEach(g => {
          let c;
          if (hitOpen) {
            c = 'waiting';  // block downstream goals until prior ones finish
          } else if (g.done) {
            c = 'done';
          } else {
            c = 'open';
            hitOpen = true;  // first open goal — everything after is waiting
          }
          const att = g.attach ? ' <span class="goal-badge art">artifact</span>' : '';
          items += '<div class="goal-item ' + c + '">' +
            '<div class="goal-check"></div>' +
            '<span class="goal-text">' + esc(g.text) + '</span>' +
            att + '</div>';
        });
        items += '</div>';
        addEl('step',
          '<span class="tag tag-perc">GOALS</span>' +
          '<span class="val">' + items + '</span>');
        showThinking('Deciding next action...');
        break;
      }

      case 'all_done':
        rmThinking();
        addEl('step',
          '<span class="tag tag-perc">GOALS</span>' +
          '<span class="val"><span class="hi" style="color:#3fb950">&#10003; All goals satisfied</span></span>');
        markIter('all done', 'ok');
        completeLoader();
        break;

      case 'attach':
        addEl('step',
          '<span class="tag tag-art">ATTACH</span>' +
          '<span class="val"><span class="mono">' + esc(d.artifact_id) + '</span> ' +
          '<span class="dim">(' + (d.size/1024).toFixed(1) + ' KB)</span></span>');
        break;

      case 'tool_call': {
        rmThinking();
        const args = JSON.stringify(d.arguments);
        const short = args.length > 120 ? args.slice(0,120) + '...' : args;
        addEl('step',
          '<span class="tag tag-tool">TOOL</span>' +
          '<span class="val"><span class="hi">' + esc(d.tool) + '</span> ' +
          '<span class="dim">' + esc(short) + '</span></span>');
        showThinking('Executing ' + d.tool + '...');
        break;
      }

      case 'action_result': {
        rmThinking();
        const art = d.artifact_id
          ? ' &rarr; <span class="mono">' + esc(d.artifact_id) + '</span>'
          : '';
        const preview = d.result.length > 250
          ? d.result.slice(0,250) + '...'
          : d.result;
        addEl('step',
          '<span class="tag tag-res">RESULT</span>' +
          '<span class="val"><span class="dim">' + esc(preview) + '</span>' + art + '</span>');
        markIter('done', 'ok');
        break;
      }

      case 'answer': {
        rmThinking();
        const txt = d.text.length > 500 ? d.text.slice(0,500) + '...' : d.text;
        addEl('step',
          '<span class="tag tag-ans">ANSWER</span>' +
          '<span class="val">' + esc(txt) + '</span>');
        markIter('answered', 'ok');
        break;
      }

      case 'final':
        rmThinking();
        markIter('complete', 'ok');
        rmStatus();
        completeLoader();
        addEl('final-box',
          '<h3>&#10003; FINAL ANSWER</h3>' +
          '<div class="body">' + esc(d.answer) + '</div>');
        es.close(); btn.disabled = false;
        break;

      case 'error':
        rmThinking();
        markIter('error', 'err');
        rmStatus();
        completeLoader();
        addEl('err-box', esc(d.message));
        es.close(); btn.disabled = false;
        break;
    }
  };

  es.onerror = () => {
    if (!btn.disabled) return;
    rmThinking();
    markIter('disconnected', 'err');
    rmStatus(); completeLoader(); btn.disabled = false; es.close();
  };
}

/* Loader bar helpers */
function showLoader() {
  rmLoader();
  const bar = document.createElement('div');
  bar.className = 'loader-bar'; bar.id = 'loader';
  bar.innerHTML = '<div class="fill"></div>';
  log.appendChild(bar);
  scroll();
}
function completeLoader() {
  const el = document.getElementById('loader');
  if (el) el.classList.add('done');
}
function rmLoader() {
  const el = document.getElementById('loader');
  if (el) el.remove();
}

/* Thinking dots helpers */
function showThinking(label) {
  rmThinking();
  const el = document.createElement('div');
  el.className = 'thinking'; el.id = 'thinking';
  el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>' +
    '<span class="thinking-label">' + esc(label||'Thinking...') + '</span>';
  log.appendChild(el);
  scroll();
}
function rmThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}
</script>
</body>
</html>
