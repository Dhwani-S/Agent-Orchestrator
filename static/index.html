<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent6 — Travel Planner</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3140;
    --text: #e4e4e7;
    --text2: #9ca3af;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .tag {
    font-size: 11px; padding: 3px 8px;
    background: var(--surface2); border-radius: 20px;
    color: var(--text2);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Messages */
  .msg {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
  .msg.user {
    display: flex; justify-content: flex-end;
  }
  .msg.user .bubble {
    background: var(--accent);
    color: white;
    border-radius: 16px 16px 4px 16px;
    padding: 12px 16px;
    max-width: 70%;
    font-size: 14px; line-height: 1.5;
  }
  .msg.agent .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    padding: 16px;
    font-size: 14px; line-height: 1.6;
    white-space: pre-wrap;
  }

  /* Thinking block */
  .thinking-block {
    max-width: 800px; width: 100%; margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .thinking-header {
    padding: 10px 16px;
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
    user-select: none;
  }
  .thinking-header .iter-badge {
    background: var(--accent);
    color: white;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .thinking-header .arrow { transition: transform 0.2s; }
  .thinking-header.open .arrow { transform: rotate(90deg); }
  .thinking-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .thinking-body.open { max-height: 2000px; }
  .thinking-body-inner { padding: 12px 16px; }

  /* Goal pills */
  .goals { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .goal-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 5px;
  }
  .goal-pill.done { border-color: var(--green); color: var(--green); }
  .goal-pill.open { border-color: var(--amber); color: var(--amber); }
  .goal-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .goal-pill.done .dot { background: var(--green); }
  .goal-pill.open .dot { background: var(--amber); }

  /* Event rows */
  .event-row {
    font-size: 12px;
    padding: 4px 0;
    color: var(--text2);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .event-row .tag {
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    flex-shrink: 0;
  }
  .tag-tool { background: #1e3a5f; color: #60a5fa; }
  .tag-answer { background: #1a3a2a; color: #4ade80; }
  .tag-result { background: #3a2a1a; color: #fbbf24; }
  .tag-attach { background: #2a1a3a; color: #c084fc; }
  .tag-log { background: var(--surface2); color: var(--text2); }
  .event-row .detail {
    word-break: break-word;
    line-height: 1.4;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Input bar */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    max-width: 850px;
    width: 100%;
    margin: 0 auto;
  }
  .input-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--text2); }
  .input-bar button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .input-bar button:hover { background: var(--accent2); }
  .input-bar button:disabled {
    opacity: 0.5; cursor: not-allowed;
  }

  /* Final answer card */
  .final-card {
    max-width: 800px; width: 100%; margin: 0 auto;
    background: linear-gradient(135deg, #1a2332, #1a3328);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .final-card h3 {
    color: var(--green);
    font-size: 13px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .final-card .text {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  /* Error */
  .error-card {
    max-width: 800px; width: 100%; margin: 0 auto;
    background: #2a1a1a;
    border: 1px solid var(--red);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">A6</div>
  <h1>Agent6</h1>
  <span class="tag">4-Role Cognitive Agent</span>
</div>

<div class="chat-area" id="chat"></div>

<div class="input-bar">
  <input id="input" type="text" placeholder="Ask anything — travel plans, research, file ops…"
         autofocus />
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let currentThinking = null;
let currentBody = null;

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) send(); });

function scrollBottom() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(d);
  scrollBottom();
}

function addFinal(text) {
  const d = document.createElement('div');
  d.className = 'final-card';
  d.innerHTML = `<h3>✦ Final Answer</h3><div class="text">${esc(text)}</div>`;
  chat.appendChild(d);
  scrollBottom();
}

function addError(text) {
  const d = document.createElement('div');
  d.className = 'error-card';
  d.textContent = text;
  chat.appendChild(d);
  scrollBottom();
}

function startThinkingBlock(iter) {
  const block = document.createElement('div');
  block.className = 'thinking-block';

  const header = document.createElement('div');
  header.className = 'thinking-header open';
  header.innerHTML = `<span class="arrow">▶</span>
    <span class="iter-badge">iter ${iter}</span>
    <span class="spinner"></span>
    <span class="status">working…</span>`;
  header.onclick = () => {
    header.classList.toggle('open');
    body.classList.toggle('open');
  };

  const body = document.createElement('div');
  body.className = 'thinking-body open';
  const inner = document.createElement('div');
  inner.className = 'thinking-body-inner';
  body.appendChild(inner);

  block.appendChild(header);
  block.appendChild(body);
  chat.appendChild(block);

  currentThinking = block;
  currentBody = inner;
  scrollBottom();
}

function addEvent(tag, tagClass, detail) {
  if (!currentBody) return;
  const row = document.createElement('div');
  row.className = 'event-row';
  row.innerHTML = `<span class="tag ${tagClass}">${tag}</span><span class="detail">${detail}</span>`;
  currentBody.appendChild(row);
  scrollBottom();
}

function addGoals(goals) {
  if (!currentBody) return;
  const wrap = document.createElement('div');
  wrap.className = 'goals';
  goals.forEach(g => {
    const cls = g.done ? 'done' : 'open';
    const att = g.attach ? ` 📎` : '';
    wrap.innerHTML += `<span class="goal-pill ${cls}"><span class="dot"></span>${esc(g.text)}${att}</span>`;
  });
  currentBody.appendChild(wrap);
  scrollBottom();
}

function finishThinking(status) {
  if (!currentThinking) return;
  const h = currentThinking.querySelector('.thinking-header');
  const spinner = h.querySelector('.spinner');
  const statusEl = h.querySelector('.status');
  if (spinner) spinner.remove();
  statusEl.textContent = status || 'done';
  h.classList.remove('open');
  currentThinking.querySelector('.thinking-body').classList.remove('open');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function send() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  sendBtn.disabled = true;
  addUserMsg(q);

  const es = new EventSource(`/api/chat?q=${encodeURIComponent(q)}`);

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    console.log('SSE event:', d.type, d);

    switch (d.type) {
      case 'start':
        // Show a connecting indicator
        {
          const d2 = document.createElement('div');
          d2.className = 'msg agent';
          d2.id = 'agent-status';
          d2.innerHTML = `<div class="bubble"><span class="spinner"></span> Agent working on your request…</div>`;
          chat.appendChild(d2);
          scrollBottom();
        }
        break;

      case 'log':
        // Update status indicator
        {
          const st = document.getElementById('agent-status');
          if (st) st.querySelector('.bubble').innerHTML = `<span class="spinner"></span> ${esc(d.message)}`;
        }
        addEvent('log', 'tag-log', d.message);
        break;

      case 'iter_start':
        finishThinking();
        // Remove connecting indicator
        { const st = document.getElementById('agent-status'); if (st) st.remove(); }
        startThinkingBlock(d.iter);
        addEvent('memory', 'tag-log', `${d.hits} hits`);
        break;

      case 'perception':
        addGoals(d.goals);
        break;

      case 'all_done':
        finishThinking('all goals satisfied ✓');
        break;

      case 'attach':
        addEvent('attach', 'tag-attach', `${d.artifact_id} (${(d.size/1024).toFixed(1)} KB)`);
        break;

      case 'tool_call':
        addEvent('tool', 'tag-tool', `${d.tool}(${JSON.stringify(d.arguments).slice(0,120)})`);
        break;

      case 'action_result':
        const artTag = d.artifact_id ? ` → ${d.artifact_id}` : '';
        addEvent('result', 'tag-result', d.result.slice(0, 300) + artTag);
        break;

      case 'answer':
        addEvent('answer', 'tag-answer', d.text.slice(0, 300));
        break;

      case 'final':
        finishThinking();
        addFinal(d.answer);
        es.close();
        sendBtn.disabled = false;
        break;

      case 'error':
        finishThinking('error');
        addError(d.message);
        es.close();
        sendBtn.disabled = false;
        break;
    }
  };

  es.onerror = () => {
    // EventSource fires onerror on stream end; only show disconnected
    // if we never received a final/error event (i.e. unexpected close)
    if (!sendBtn.disabled) return; // already handled by final/error
    finishThinking('disconnected');
    sendBtn.disabled = false;
    es.close();
  };
}
</script>
</body>
</html>
