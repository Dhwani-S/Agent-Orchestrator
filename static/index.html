<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent6 — 4-Role Cognitive Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0d1117; color: #e6edf3;
    height: 100vh; display: flex; flex-direction: column;
  }

  .header {
    padding: 10px 20px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 10px;
    background: #161b22; flex-shrink: 0;
  }
  .logo {
    width: 30px; height: 30px; background: #6366f1; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: #fff;
  }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header .badge {
    font-size: 10px; padding: 2px 7px; background: #21262d;
    border: 1px solid #30363d; border-radius: 10px; color: #8b949e;
  }

  .chat {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }

  #log {
    max-width: 820px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 6px;
  }

  /* User query */
  .q-line {
    background: #6366f1; color: #fff; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; line-height: 1.5;
    margin-bottom: 8px; align-self: flex-end;
    max-width: 75%;
  }

  /* Iteration header */
  .iter-hdr {
    margin-top: 10px; padding: 6px 10px;
    background: #21262d; border-radius: 6px;
    font-size: 12px; font-weight: 700; color: #8b949e;
    display: flex; align-items: center; gap: 8px;
  }
  .iter-hdr .num {
    background: #6366f1; color: #fff; font-size: 10px;
    padding: 1px 7px; border-radius: 4px;
  }
  .iter-hdr .st { margin-left: auto; font-weight: 600; }
  .iter-hdr .st.ok  { color: #3fb950; }
  .iter-hdr .st.err { color: #f85149; }
  .iter-hdr .st.run { color: #d29922; }

  /* Generic step line */
  .step {
    display: flex; gap: 8px; padding: 4px 0 4px 12px;
    font-size: 12px; line-height: 1.6; align-items: baseline;
    border-left: 2px solid #30363d;
    margin-left: 8px;
  }
  .step:last-child { border-left-color: transparent; }

  .tag {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
    letter-spacing: .4px; white-space: nowrap;
  }
  .tag-mem  { background: #1c2333; color: #58a6ff; }
  .tag-perc { background: #162320; color: #3fb950; }
  .tag-tool { background: #1e3048; color: #79c0ff; }
  .tag-res  { background: #2a2215; color: #d29922; }
  .tag-ans  { background: #1a2e1a; color: #56d364; }
  .tag-art  { background: #261a33; color: #bc8cff; }
  .tag-log  { background: #21262d; color: #8b949e; }

  .val { word-break: break-word; color: #c9d1d9; }
  .val .dim { color: #8b949e; }
  .val .hi  { color: #e6edf3; font-weight: 600; }
  .mono {
    font-family: Consolas, 'Cascadia Code', monospace;
    font-size: 11px; background: #21262d;
    padding: 1px 4px; border-radius: 3px;
  }

  /* Goal pills */
  .gpill {
    display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 12px; margin: 2px 3px 2px 0;
    border: 1px solid #30363d;
  }
  .gpill.done { border-color: #3fb950; color: #3fb950; }
  .gpill.open { border-color: #d29922; color: #d29922; }

  /* Final answer */
  .final-box {
    margin-top: 12px; padding: 14px 16px;
    background: #161b22; border: 1px solid #3fb950;
    border-left: 4px solid #3fb950; border-radius: 6px;
  }
  .final-box h3 {
    color: #3fb950; font-size: 11px; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .final-box .body {
    font-size: 13px; line-height: 1.7; white-space: pre-wrap; color: #e6edf3;
  }

  /* Error */
  .err-box {
    margin-top: 8px; padding: 10px 14px;
    background: #1f1315; border: 1px solid #f85149;
    border-radius: 6px; color: #f85149; font-size: 12px;
  }

  /* Status */
  .sts {
    padding: 6px 0; font-size: 12px; color: #8b949e;
    display: flex; align-items: center; gap: 6px;
  }
  .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6366f1; animation: p 1s ease infinite;
  }
  @keyframes p { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* Input */
  .input-bar {
    border-top: 1px solid #30363d; padding: 10px 20px;
    display: flex; gap: 8px; max-width: 860px; width: 100%;
    margin: 0 auto; flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; padding: 10px 12px; color: #e6edf3;
    font-size: 13px; outline: none;
  }
  .input-bar input:focus { border-color: #6366f1; }
  .input-bar input::placeholder { color: #484f58; }
  .input-bar button {
    background: #6366f1; color: #fff; border: none;
    border-radius: 8px; padding: 10px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .input-bar button:hover { background: #818cf8; }
  .input-bar button:disabled { opacity: .4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">A6</div>
  <h1>Agent6</h1>
  <span class="badge">4-Role Cognitive Agent</span>
</div>

<div class="chat" id="chat">
  <div id="log"></div>
</div>

<div class="input-bar">
  <input id="inp" type="text" placeholder="Ask anything..." autofocus />
  <button id="btn" onclick="send()">Send</button>
</div>

<script>
const log = document.getElementById('log');
const chatEl = document.getElementById('chat');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
let curIterHdr = null;

inp.addEventListener('keydown', e => { if (e.key==='Enter' && !btn.disabled) send(); });

function scroll() {
  requestAnimationFrame(() => chatEl.scrollTop = chatEl.scrollHeight);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addEl(cls, html) {
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = html;
  log.appendChild(d);
  scroll();
  return d;
}

function setStatus(msg) {
  let el = document.getElementById('sts');
  if (!el) {
    el = document.createElement('div');
    el.className = 'sts'; el.id = 'sts';
    log.appendChild(el);
  }
  el.innerHTML = '<span class="pulse"></span> ' + esc(msg);
  scroll();
}

function rmStatus() {
  const el = document.getElementById('sts');
  if (el) el.remove();
}

function markIter(text, cls) {
  if (!curIterHdr) return;
  const st = curIterHdr.querySelector('.st');
  if (st) { st.className = 'st ' + cls; st.textContent = text; }
}

function send() {
  const q = inp.value.trim();
  if (!q) return;
  inp.value = ''; btn.disabled = true;
  curIterHdr = null;

  // separator if not first query
  if (log.children.length > 0) {
    addEl('', '').style.cssText = 'border-top:1px solid #30363d; margin:14px 0;';
  }

  addEl('q-line', esc(q));

  const es = new EventSource('/api/chat?q=' + encodeURIComponent(q));

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);

    switch (d.type) {
      case 'start':
        setStatus('Connecting to agent...');
        break;

      case 'log':
        setStatus(d.message);
        break;

      case 'iter_start': {
        rmStatus();
        if (curIterHdr) markIter('done', 'ok');
        const hdr = addEl('iter-hdr',
          '<span class="num">ITER ' + d.iter + '</span>' +
          '<span class="st run">running...</span>');
        curIterHdr = hdr;
        addEl('step',
          '<span class="tag tag-mem">MEMORY</span>' +
          '<span class="val">' + d.hits + ' relevant hit' + (d.hits!==1?'s':'') + '</span>');
        break;
      }

      case 'perception': {
        let pills = '';
        d.goals.forEach(g => {
          const c = g.done ? 'done' : 'open';
          const prefix = g.done ? '[done] ' : '[open] ';
          const att = g.attach ? ' (has artifact)' : '';
          pills += '<span class="gpill ' + c + '">' + prefix + esc(g.text) + att + '</span> ';
        });
        addEl('step',
          '<span class="tag tag-perc">PERCEPT</span>' +
          '<span class="val">' + pills + '</span>');
        break;
      }

      case 'all_done':
        addEl('step',
          '<span class="tag tag-perc">PERCEPT</span>' +
          '<span class="val"><span class="hi" style="color:#3fb950">All goals satisfied</span></span>');
        markIter('all done', 'ok');
        break;

      case 'attach':
        addEl('step',
          '<span class="tag tag-art">ATTACH</span>' +
          '<span class="val"><span class="mono">' + esc(d.artifact_id) + '</span> ' +
          '<span class="dim">(' + (d.size/1024).toFixed(1) + ' KB)</span></span>');
        break;

      case 'tool_call': {
        const args = JSON.stringify(d.arguments);
        const short = args.length > 120 ? args.slice(0,120) + '...' : args;
        addEl('step',
          '<span class="tag tag-tool">TOOL</span>' +
          '<span class="val"><span class="hi">' + esc(d.tool) + '</span> ' +
          '<span class="dim">' + esc(short) + '</span></span>');
        break;
      }

      case 'action_result': {
        const art = d.artifact_id
          ? ' &rarr; <span class="mono">' + esc(d.artifact_id) + '</span>'
          : '';
        const preview = d.result.length > 250
          ? d.result.slice(0,250) + '...'
          : d.result;
        addEl('step',
          '<span class="tag tag-res">RESULT</span>' +
          '<span class="val"><span class="dim">' + esc(preview) + '</span>' + art + '</span>');
        markIter('done', 'ok');
        break;
      }

      case 'answer': {
        const txt = d.text.length > 500 ? d.text.slice(0,500) + '...' : d.text;
        addEl('step',
          '<span class="tag tag-ans">ANSWER</span>' +
          '<span class="val">' + esc(txt) + '</span>');
        markIter('answered', 'ok');
        break;
      }

      case 'final':
        markIter('complete', 'ok');
        rmStatus();
        addEl('final-box',
          '<h3>FINAL ANSWER</h3>' +
          '<div class="body">' + esc(d.answer) + '</div>');
        es.close(); btn.disabled = false;
        break;

      case 'error':
        markIter('error', 'err');
        rmStatus();
        addEl('err-box', esc(d.message));
        es.close(); btn.disabled = false;
        break;
    }
  };

  es.onerror = () => {
    if (!btn.disabled) return;
    markIter('disconnected', 'err');
    rmStatus(); btn.disabled = false; es.close();
  };
}
</script>
</body>
</html>
